<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}INVENTRCK{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
           DESIGN TOKENS
        ═══════════════════════════════════════════ */
        :root {
            --bg:      #060f1c;
            --s1:      #091628;
            --s2:      #0c1d35;
            --card:    #0f2240;
            --sidebar: #050e1a;

            --a:       #00c8e0;
            --a2:      #0077b6;
            --grad:    linear-gradient(135deg, #00c8e0 0%, #0077b6 100%);
            --glow:    rgba(0, 200, 224, 0.10);

            --txt:     #cce4ff;
            --txt2:    #7ba5c8;
            --txt3:    #4a6f92;

            --ok:      #10d9a0;
            --warn:    #f0b429;
            --crit:    #f96060;
            --dead:    #ff3333;

            --ok-bg:   rgba(16, 217, 160, 0.08);
            --warn-bg: rgba(240, 180, 41, 0.08);
            --crit-bg: rgba(249, 96, 96, 0.08);
            --dead-bg: rgba(255, 51, 51, 0.10);

            --bdr:     rgba(0, 200, 224, 0.07);
            --bdr2:    rgba(0, 200, 224, 0.14);
            --r:       10px;
            --r-sm:    7px;
            --sidebar-w: 252px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            display: flex;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--txt3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--a); }

        /* ═══════════════════════════════════════════
           SIDEBAR
        ═══════════════════════════════════════════ */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--sidebar);
            border-right: 1px solid var(--bdr);
            display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; bottom: 0;
            z-index: 100;
            transition: transform .3s cubic-bezier(.4,0,.2,1);
        }

        .sb-brand {
            padding: 22px 18px;
            border-bottom: 1px solid var(--bdr);
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0;
        }

        .sb-logo {
            width: 36px; height: 36px;
            background: var(--grad);
            border-radius: 9px;
            display: grid; place-items: center;
            font-size: 15px; color: #fff;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(0,119,182,0.4);
        }

        .sb-name {
            font-size: 16px; font-weight: 900;
            letter-spacing: 3px;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sb-nav {
            flex: 1; overflow-y: auto;
            padding: 14px 10px;
        }

        .nav-section {
            margin-bottom: 4px;
        }

        .nav-lbl {
            font-size: 9px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--txt3);
            padding: 10px 10px 5px;
            display: block;
        }

        .nav-a {
            display: flex; align-items: center; gap: 11px;
            padding: 9px 12px; border-radius: 8px;
            color: var(--txt2); text-decoration: none;
            font-size: 13.5px; font-weight: 500;
            transition: all .18s;
            margin-bottom: 2px;
            position: relative;
        }

        .nav-a:hover { background: var(--glow); color: var(--a); }

        .nav-a.act {
            background: var(--glow);
            color: var(--a);
        }
        .nav-a.act::before {
            content: '';
            position: absolute; left: 0; top: 50%;
            transform: translateY(-50%);
            width: 3px; height: 55%;
            background: var(--a);
            border-radius: 0 2px 2px 0;
        }

        .nav-a .ni { width: 18px; text-align: center; font-size: 13px; flex-shrink: 0; }

        .nav-badge {
            margin-left: auto;
            background: var(--crit); color: #fff;
            font-size: 10px; font-weight: 700;
            padding: 1px 6px; border-radius: 10px;
            min-width: 20px; text-align: center;
            animation: pulse-badge 2s ease infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .sb-foot {
            padding: 12px 10px;
            border-top: 1px solid var(--bdr);
            flex-shrink: 0;
        }

        .logout-a {
            display: flex; align-items: center; gap: 11px;
            padding: 9px 12px; border-radius: 8px;
            color: var(--crit); text-decoration: none;
            font-size: 13.5px; font-weight: 500;
            transition: background .18s;
        }
        .logout-a:hover { background: rgba(249,96,96,0.08); }

        /* ═══════════════════════════════════════════
           MAIN CONTENT
        ═══════════════════════════════════════════ */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 36px 40px;
            min-height: 100vh;
        }

        /* ═══════════════════════════════════════════
           SHARED UI COMPONENTS
        ═══════════════════════════════════════════ */

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 9px 20px; border-radius: 8px;
            font-size: 13.5px; font-weight: 600;
            font-family: 'Inter', sans-serif;
            text-decoration: none; cursor: pointer; border: none;
            transition: all .2s; line-height: 1.4;
        }
        .btn-prim {
            background: var(--grad); color: #fff;
            box-shadow: 0 4px 14px rgba(0,119,182,0.35);
        }
        .btn-prim:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,119,182,0.45); }
        .btn-prim:active { transform: translateY(0); }

        .btn-ghost {
            background: transparent; color: var(--txt2);
            border: 1px solid var(--bdr2);
        }
        .btn-ghost:hover { border-color: var(--a); color: var(--a); background: var(--glow); }

        .btn-danger {
            background: rgba(249,96,96,0.08); color: var(--crit);
            border: 1px solid rgba(249,96,96,0.15);
        }
        .btn-danger:hover { background: rgba(249,96,96,0.15); }

        /* Expiry badges */
        .xbadge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 9px; border-radius: 20px;
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.3px;
        }
        .xbadge-ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid rgba(16,217,160,0.18); }
        .xbadge-warn { background: var(--warn-bg);  color: var(--warn); border: 1px solid rgba(240,180,41,0.18); }
        .xbadge-crit { background: var(--crit-bg);  color: var(--crit); border: 1px solid rgba(249,96,96,0.18); }
        .xbadge-dead { background: var(--dead-bg);  color: var(--dead); border: 1px solid rgba(255,51,51,0.25); }

        /* ═══════════════════════════════════════════
           MOBILE HAMBURGER + OVERLAY
        ═══════════════════════════════════════════ */
        .ham {
            display: none;
            position: fixed; top: 14px; right: 16px; z-index: 200;
            background: var(--s2); border: 1px solid var(--bdr2);
            color: var(--txt); padding: 9px 13px;
            border-radius: 8px; cursor: pointer;
            font-size: 14px; line-height: 1; align-items: center;
        }

        .ovr {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.65); z-index: 90;
            backdrop-filter: blur(2px);
        }

        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 6px 0 40px rgba(0,0,0,.7); }
            .ovr.show { display: block; }
            .ham { display: flex; }
            .main { margin-left: 0; padding: 18px 16px; padding-top: 54px; }
        }

        @media (max-width: 480px) {
            .main { padding: 14px 12px; padding-top: 54px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<button class="ham" onclick="toggleSb()"><i class="fas fa-bars"></i></button>
<div class="ovr" id="ovr" onclick="toggleSb()"></div>

<aside class="sidebar" id="sb">
    <div class="sb-brand">
        <div class="sb-logo"><i class="fas fa-boxes-stacked"></i></div>
        <span class="sb-name">INVENTRCK</span>
    </div>

    <nav class="sb-nav">
        <div class="nav-section">
            <span class="nav-lbl">Overview</span>
            <a href="{{ url_for('home') }}"
               class="nav-a {% if request.endpoint == 'home' %}act{% endif %}">
                <span class="ni"><i class="fas fa-chart-pie"></i></span>Dashboard
            </a>
        </div>

        <div class="nav-section">
            <span class="nav-lbl">Operations</span>
            <a href="{{ url_for('add_batchs') }}"
               class="nav-a {% if request.endpoint == 'add_batchs' %}act{% endif %}">
                <span class="ni"><i class="fas fa-cube"></i></span>Add Batch
            </a>
            <a href="{{ url_for('sell_product_route') }}"
               class="nav-a {% if request.endpoint == 'sell_product_route' %}act{% endif %}">
                <span class="ni"><i class="fas fa-cart-arrow-down"></i></span>Sell Product
            </a>
            <a href="{{ url_for('get_expiring_stock_route') }}"
               class="nav-a {% if request.endpoint == 'get_expiring_stock_route' %}act{% endif %}">
                <span class="ni"><i class="fas fa-hourglass-half"></i></span>Expiry Watch
                {% if expiring_items is defined and expiring_items | length > 0 %}
                <span class="nav-badge">{{ expiring_items | length }}</span>
                {% endif %}
            </a>
        </div>
    </nav>

    <div class="sb-foot">
        <a href="{{ url_for('logout') }}" class="logout-a">
            <span class="ni"><i class="fas fa-right-from-bracket"></i></span>Logout
        </a>
    </div>
</aside>

<main class="main">
    {% block content %}{% endblock %}
</main>

<script>
function toggleSb() {
    document.getElementById('sb').classList.toggle('open');
    document.getElementById('ovr').classList.toggle('show');
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
