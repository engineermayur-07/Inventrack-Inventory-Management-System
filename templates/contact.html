<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Professional Corporate Portal</title>
    <style>
        /* Modern Reset & Base Variable Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        :root {
            --primary-color: #0f172a;       /* Sophisticated dark slate color */
            --accent-color: #2563eb;        /* Professional royal blue accent */
            --accent-hover: #1d4ed8;        /* Deeper tone blue for hover actions */
            --bg-light: #f8fafc;            /* Clean light grey backdrop tint */
            --card-bg: #ffffff;             /* Crisp pure white element fills */
            --text-dark: #1e293b;           /* High contrast body font color */
            --text-muted: #64748b;          /* Soft grey color for secondary details */
            --border-color: #e2e8f0;        /* Subtle divider outline value */
            --radius-md: 12px;              /* Standard professional curvature */
            --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Structure */
        .contact-container {
            max-width: 1200px;
            width: 100%;
            background: var(--card-bg);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1.3fr;
        }

        /* Left Column: Essential Contact Information Side */
        .contact-info-panel {
            background-color: var(--primary-color);
            color: #ffffff;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .info-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.025em;
        }

        .info-header p {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 40px;
        }

        .details-list {
            list-style: none;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 30px;
        }

        .icon-wrapper {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .detail-item:hover .icon-wrapper {
            background: var(--accent-color);
            transform: translateY(-2px);
        }

        .icon-wrapper svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
        }

        .item-text h4 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .item-text p, .item-text a {
            font-size: 1.05rem;
            color: #f1f5f9;
            text-decoration: none;
            transition: var(--transition);
        }

        .item-text a:hover {
            color: #3b82f6;
        }

        /* Subtle professional backdrop detail decoration */
        .info-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Right Column: Embedded Dynamic Interaction Form */
        .contact-form-panel {
            padding: 50px;
            background: var(--card-bg);
        }

        .form-panel-header {
            margin-bottom: 32px;
        }

        .form-panel-header h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .form-panel-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-dark);
            background-color: #ffffff;
            transition: var(--transition);
            outline: none;
        }

        /* Crisp high-end focal ring style interactions */
        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 140px;
        }

        .submit-btn {
            grid-column: span 2;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            margin-top: 8px;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Highly Adaptable Mobile Grid Layout Overrides */
        @media (max-width: 968px) {
            body {
                padding: 30px 15px;
            }
            .contact-container {
                grid-template-columns: 1fr;
            }
            .contact-info-panel {
                padding: 40px 30px;
            }
            .contact-form-panel {
                padding: 40px 30px;
            }
        }

        @media (max-width: 576px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .submit-btn {
                grid-column: span 1;
                width: 100%;
            }
        }
    </style>
</head>
